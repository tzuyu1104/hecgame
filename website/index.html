<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Hexagon Miner</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <header class="hud">
        <h1>Hexagon Miner</h1>
        <div class="status-row">
          <div id="timer" class="pill">Time: 0s</div>
          <div id="mine-counter" class="pill">Mines: 10</div>
          <div id="state" class="pill">State: Ready</div>
          <button id="restart" type="button">Restart</button>
        </div>
        <div class="control-grid">
          <label>
            Rows
            <input id="rows-input" type="number" min="2" max="40" value="12" />
          </label>
          <label>
            Cols
            <input id="cols-input" type="number" min="2" max="40" value="6" />
          </label>
          <label>
            Holes
            <input id="holes-input" type="number" min="0" max="120" value="8" />
          </label>
          <label>
            Mines
            <input id="mines-input" type="number" min="1" max="300" value="10" />
          </label>
          <button id="default-map-btn" type="button">Default Map 6x12</button>
          <button id="sized-map-btn" type="button">Generate Sized Map</button>
          <button id="random-map-btn" type="button">Generate Random Hole Map</button>
          <button id="set-mines-btn" type="button">Set Mine Count</button>
        </div>
      </header>
      <!-- Debug state bar -- temporary debug option -->
      <div class="debug-bar">
        <div class="debug-section">
          <label for="debug-tile-row">Tile Row</label>
          <input id="debug-tile-row" type="number" min="0" value="0" />
          <label for="debug-tile-col">Tile Col</label>
          <input id="debug-tile-col" type="number" min="0" value="0" />
        </div>
        <div class="debug-section">
          <span id="debug-tile-info" class="debug-text">No cell selected</span>
        </div>
        <div class="debug-section">
          <span id="debug-vertex-info" class="debug-text"></span>
        </div>
      </div>
      <main>
        <div id="game-container"></div>
      </main>
    </div>
    <script src="./dist/game.js"></script>
  </body>
</html>
